<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex & Steve - 8-bit Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Alex & Steve - 8-bit Adventure</h1>
            <div class="controls-info">
                <p><strong>Steve:</strong> Arrow Keys to move, Space/Up to jump</p>
                <p><strong>Alex:</strong> A/D to move, W to jump</p>
                <p><strong>Action:</strong> Press 'E' near trees to chop them</p>
                <p><strong>Debug:</strong> Press 'D' to toggle bounding box visualization</p>
            </div>
        </header>
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
        <div class="loading" id="loading">
            <p>Loading sprite sheets...</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
